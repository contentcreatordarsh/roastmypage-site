name = "roast-my-landing-page-test"
main = "src/index.js"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

# --- SHARED RESOURCES ---
# These bindings are inherited by all environments so Dev and Prod share the same database/storage
[assets]
directory = "./public"
binding = "ASSETS"

[ai]
binding = "AI"

[browser]
binding = "BROWSER"

[[d1_databases]]
binding = "DB"
database_name = "roast-db"
database_id = "7b59df5c-8185-4562-b149-ae28ebf65dca"

[[r2_buckets]]
binding = "SCREENSHOTS"
bucket_name = "roast-screenshots"

[[kv_namespaces]]
binding = "CONFIG"
id = "a0e0cee4c5e54235a12ee8dcc262f41a"

# --- TEST ENVIRONMENT VARS (DEFAULT) ---
# Deploy via: npx wrangler deploy
[vars]
ENVIRONMENT = "development"
BASE_URL = "https://roast-my-landing-page-test.falling-hall-ac41.workers.dev"
# Cloudflare Tags (Optional for test, but included for parity)
CF_ACCOUNT_TAG = "0fa4850c978886b80a15821863df3855"
CF_ZONE_TAG = "1147710735"

# --- PRODUCTION ENVIRONMENT ---
# Deploy via: npx wrangler deploy --env production
[env.production]
name = "roast-my-landing-page"

[env.production.vars]
ENVIRONMENT = "production"
BASE_URL = "https://roastmypage.site"
CF_ACCOUNT_TAG = "0fa4850c978886b80a15821863df3855"
CF_ZONE_TAG = "1147710735"

name: Create Audit Issues

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (preview only, do not create issues)"
        required: false
        type: boolean
        default: false

permissions:
  issues: write
  contents: read

jobs:
  create-issues:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Create audit issues
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ARGS=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            ARGS="--dry-run"
          fi
          python3 scripts/create-audit-issues.py $ARGS
